name: elysia-auth-service

services:
  postgres:
    image: postgres
    container_name: elysia-auth-service-postgres
    environment:
      POSTGRES_DB: elysia-auth-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - elysia-auth-service_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  elysia-auth-service_postgres_data:
